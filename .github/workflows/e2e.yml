name: 'e2e'
on:
  push:
    branches:
      - next
  pull_request:
    branches:
      - next
jobs:
  e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node_version: [18.20.0]
        include:
          - os: macos-latest
            node_version: 18.20.0
          - os: windows-latest
            node_version: 18.20.0
      fail-fast: false
    name: 'e2e: node-${{ matrix.node_version }}, ${{ matrix.os }}'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node version to ${{ matrix.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          check-latest: false
          cache: 'pnpm'

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Cypress
            ~/Library/Caches/Cypress
            %LOCALAPPDATA%\Cypress\Cache
          key: ${{ runner.os }}-cypress-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: Install dependencies
        run: pnpm install

      - name: Ensure Cypress is installed
        run: npx cypress install

      - name: Build
        run: npm run build:h5

      - name: verify Cypress
        working-directory: ./packages/playground/ssr
        run: |
          npx cypress verify
          npx cypress info
          npx cypress version
          npx cypress version --component package
          npx cypress version --component binary
          npx cypress version --component electron
          npx cypress version --component node

      - name: Cypress run
        uses: cypress-io/github-action@v5
        with:
          install: false
          start: npm run dev:ssr
          working-directory: ./packages/playground/ssr
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 480
          browser: chrome
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cypress run
        uses: cypress-io/github-action@v5
        with:
          install: false
          start: npm run dev:ssr
          working-directory: ./packages/playground/ssr-x
          wait-on: 'http://localhost:5174'
          wait-on-timeout: 480
          browser: chrome
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
